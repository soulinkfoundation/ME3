<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Google Search uses link rel=icon; include ICO + PNG and correct MIME types -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" href="/favicon.png" sizes="500x500" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ME3" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <script>
      (() => {
        try {
          const preference = window.localStorage.getItem("me3-theme");
          const systemIsDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const effectiveTheme =
            preference === "light" || preference === "dark"
              ? preference
              : systemIsDark
                ? "dark"
                : "light";

          if (preference === "light" || preference === "dark") {
            document.documentElement.dataset.theme = preference;
          }
          document.documentElement.style.colorScheme = effectiveTheme;
        } catch {
          // Fall back to the system theme when storage is unavailable.
        }
      })();
    </script>
    <title>ME3: Your Personal AI Assistant</title>
    <meta
      name="description"
      content="An assistant for coaches, educators, therapists, and creators who help people every day. Your site, calendar, and email in one place."
    />
    <link rel="canonical" href="https://example.com/" />
    <meta name="robots" content="index,follow" />
    <meta property="og:title" content="ME3: Your Personal AI Assistant" />
    <meta
      property="og:description"
      content="An assistant for coaches, educators, therapists, and creators who help people every day. Your site, calendar, and email in one place."
    />
    <meta property="og:image" content="https://example.com/icons/icon-512.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:site_name" content="ME3" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ME3: Your Personal AI Assistant" />
    <meta
      name="twitter:description"
      content="An assistant for coaches, educators, therapists, and creators who help people every day. Your site, calendar, and email in one place."
    />
    <meta name="twitter:image" content="https://example.com/icons/icon-512.png" />
    <script>
      if ("standalone" in navigator && navigator.standalone) {
        document.documentElement.classList.add("is-ios-standalone");
      }
    </script>
    <style>
      html,
      body,
      #app {
        min-height: 100%;
        background: #fff;
      }

      body {
        margin: 0;
      }

      .app-launch-splash {
        position: fixed;
        inset: 0;
        display: flex;
        min-height: 100vh;
        min-height: 100dvh;
        align-items: center;
        justify-content: center;
        background: #fff;
        overflow: hidden;
      }

      .app-launch-splash__logo {
        width: min(132px, 38vw);
        height: auto;
      }

      .app-launch-splash__logo--dark {
        display: none;
      }

      .app-launch-splash__progress {
        position: absolute;
        inset: 0 auto auto 0;
        width: 72%;
        height: 2px;
        background: #1f9d91;
        animation: app-launch-progress 650ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }

      :root[data-theme="dark"],
      :root[data-theme="dark"] body,
      :root[data-theme="dark"] #app,
      :root[data-theme="dark"] .app-launch-splash {
        background: #111;
      }

      :root[data-theme="dark"] .app-launch-splash__logo--light {
        display: none;
      }

      :root[data-theme="dark"] .app-launch-splash__logo--dark {
        display: block;
      }

      @media (prefers-color-scheme: dark) {
        :root:not([data-theme]),
        :root:not([data-theme]) body,
        :root:not([data-theme]) #app,
        :root:not([data-theme]) .app-launch-splash {
          background: #111;
        }

        :root:not([data-theme]) .app-launch-splash__logo--light {
          display: none;
        }

        :root:not([data-theme]) .app-launch-splash__logo--dark {
          display: block;
        }
      }

      @keyframes app-launch-progress {
        from {
          width: 0;
        }

        to {
          width: 72%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .app-launch-splash__progress {
          animation: none;
        }
      }

    </style>
  </head>
  <body>
    <div id="app">
      <div class="app-launch-splash" role="status" aria-label="ME3 is loading">
        <div class="app-launch-splash__progress" aria-hidden="true"></div>
        <img
          class="app-launch-splash__logo app-launch-splash__logo--light"
          src="/me3-logo-light.png"
          alt=""
        />
        <img
          class="app-launch-splash__logo app-launch-splash__logo--dark"
          src="/me3-logo-dark.png"
          alt=""
        />
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

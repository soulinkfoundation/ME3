<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Google Search uses link rel=icon; include ICO + PNG and correct MIME types -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" href="/favicon.png" sizes="500x500" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ME3" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>ME3: Your Personal AI Assistant</title>
    <meta
      name="description"
      content="An assistant for coaches, educators, therapists, and creators who help people every day. Your site, calendar, and email in one place."
    />
    <link rel="canonical" href="https://example.com/" />
    <meta name="robots" content="index,follow" />
    <meta property="og:title" content="ME3: Your Personal AI Assistant" />
    <meta
      property="og:description"
      content="An assistant for coaches, educators, therapists, and creators who help people every day. Your site, calendar, and email in one place."
    />
    <meta property="og:image" content="https://example.com/icons/icon-512.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:site_name" content="ME3" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ME3: Your Personal AI Assistant" />
    <meta
      name="twitter:description"
      content="An assistant for coaches, educators, therapists, and creators who help people every day. Your site, calendar, and email in one place."
    />
    <meta name="twitter:image" content="https://example.com/icons/icon-512.png" />
    <script>
      if ("standalone" in navigator && navigator.standalone) {
        document.documentElement.classList.add("is-ios-standalone");
      }
    </script>
    <style>
      .app-launch-splash {
        display: none;
        min-height: 100vh;
        min-height: 100dvh;
        align-items: center;
        justify-content: center;
        background: #fff;
      }

      .app-launch-splash img {
        width: min(220px, 56vw);
        height: auto;
      }

      @media (max-width: 820px) and (display-mode: standalone),
        (max-width: 820px) and (display-mode: fullscreen) {
        html,
        body,
        #app {
          min-height: 100%;
          background: #fff;
        }

        body {
          margin: 0;
        }

        .app-launch-splash {
          display: flex;
        }
      }

      @media (max-width: 820px) {
        html.is-ios-standalone,
        html.is-ios-standalone body,
        html.is-ios-standalone #app {
          min-height: 100%;
          background: #fff;
        }

        html.is-ios-standalone body {
          margin: 0;
        }

        html.is-ios-standalone .app-launch-splash {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="app-launch-splash" aria-label="ME3 is launching">
        <img src="/me3-logo-light.png" alt="ME3" />
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

name = "me3-core-worker"
main = "src/index.ts"
compatibility_date = "2024-04-01"

[[durable_objects.bindings]]
name = "ME3_USER_AGENT"
class_name = "Me3UserAgent"

[[migrations]]
tag = "2026-05-11-me3-core-user-agent"
new_sqlite_classes = ["Me3UserAgent"]

# Local dev omits the optional Workers AI binding so `pnpm dev` does not require
# a Cloudflare login for Wrangler's remote AI proxy. Keep/add the [ai] binding
# in deploy configs when the install uses Workers AI.

[[d1_databases]]
binding = "DB"
database_name = "me3-core-db"
database_id = "replace-with-generated-d1-id"

# Core file storage for site media and future plugin-owned files.
[[r2_buckets]]
binding = "SITE_ASSETS"
bucket_name = "me3-site-assets"

[[queues.producers]]
binding = "ASSISTANT_JOB_EVENTS"
queue = "me3-assistant-job-events"

[[queues.consumers]]
queue = "me3-assistant-job-events"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "me3-assistant-job-events-dlq"

[[queues.consumers]]
queue = "me3-assistant-job-events-dlq"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 0

# Optional Cloudflare Email Service sender binding. ME3 Core can also send with
# owner-configured SMTP or Postmark settings from Account -> Mailbox settings.
# [[send_email]]
# name = "EMAIL"
# allowed_sender_addresses = ["hello@example.com"]

[vars]
ENVIRONMENT = "local"
CORE_WEB_ORIGIN = "http://localhost:4000"
CORE_API_ORIGIN = "http://localhost:8787"
# Production two-host setup:
# ME3_CUSTOM_DOMAIN = "yourdomain.com"
# ME3_SITE_HOST = "yourdomain.com"
# ME3_ADMIN_HOST = "me3.yourdomain.com"
# CORE_WEB_ORIGIN = "https://me3.yourdomain.com"
# ME3_SITE_USERNAME = "owner"
ME3_AI_MODEL = "@cf/qwen/qwen3-30b-a3b-fp8"

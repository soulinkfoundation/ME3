name = "me3-core-worker"
main = "src/index.ts"
compatibility_date = "2024-04-01"

[[durable_objects.bindings]]
name = "ME3_USER_AGENT"
class_name = "Me3UserAgent"

[[migrations]]
tag = "2026-05-11-me3-core-user-agent"
new_sqlite_classes = ["Me3UserAgent"]

# Optional. Remove this section if your install does not use Workers AI.
[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "me3-core-db"
database_id = "replace-with-generated-d1-id"

# Core file storage for site media and future plugin-owned files.
[[r2_buckets]]
binding = "SITE_ASSETS"
bucket_name = "me3-site-assets"

# Reserved for a future Cloudflare Email Service sender adapter. ME3 Core's
# current outbound sender is Postmark, configured in Account -> Mailbox settings
# or with local/dev POSTMARK_* vars.
# [[send_email]]
# name = "EMAIL"
# allowed_sender_addresses = ["hello@example.com"]

[vars]
ENVIRONMENT = "local"
CORE_WEB_ORIGIN = "http://localhost:5174"
CORE_API_ORIGIN = "http://localhost:8787"
# Production two-host setup:
# ME3_CUSTOM_DOMAIN = "customdomain.com"
# Core infers me3.customdomain.com, api.customdomain.com, and www.customdomain.com.
# ME3_SITE_USERNAME = "owner"
ME3_AI_MODEL = "@cf/qwen/qwen3-30b-a3b-fp8"

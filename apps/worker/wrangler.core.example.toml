name = "me3-core-worker"
main = "src/index.ts"
compatibility_date = "2024-04-01"

[[durable_objects.bindings]]
name = "ME3_USER_AGENT"
class_name = "Me3UserAgent"

[[migrations]]
tag = "2026-05-11-me3-core-user-agent"
new_sqlite_classes = ["Me3UserAgent"]

# Workers AI is the default Core chat provider. Wrangler connects this binding
# to Cloudflare's remote AI runtime during local development.
[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "me3-core-db"
database_id = "replace-with-generated-d1-id"

# Core file storage for site media and future plugin-owned files.
[[r2_buckets]]
binding = "SITE_ASSETS"
bucket_name = "me3-site-assets"

[[queues.producers]]
binding = "ASSISTANT_JOB_EVENTS"
queue = "me3-assistant-job-events"

[[queues.producers]]
binding = "BOOKING_REMINDER_QUEUE"
queue = "me3-booking-reminders"

[[queues.consumers]]
queue = "me3-assistant-job-events"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "me3-assistant-job-events-dlq"

[[queues.consumers]]
queue = "me3-booking-reminders"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "me3-booking-reminders-dlq"

[[queues.consumers]]
queue = "me3-assistant-job-events-dlq"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 0

[[queues.consumers]]
queue = "me3-booking-reminders-dlq"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 0

[triggers]
crons = ["*/15 * * * *"]

# Cloudflare Email Service sender binding. Account -> Email stores the sender
# address; this deploy-time binding lets the Worker call env.EMAIL.send().
[[send_email]]
name = "EMAIL"

[vars]
ENVIRONMENT = "local"
CORE_WEB_ORIGIN = "http://localhost:4000"
CORE_API_ORIGIN = "http://localhost:8787"
# ME3_SITE_USERNAME = "owner"
ME3_AI_MODEL = "@cf/qwen/qwen3-30b-a3b-fp8"
ME3_AI_CHAT_BACKUP_MODEL = "@cf/zai-org/glm-4.7-flash"
# Optional override for the hosted Soulink assistant chat connector.
# Defaults to https://soulinkfoundation.org.
# SOULINK_API_ORIGIN = "https://soulinkfoundation.org"
ME3_SOCIAL_OAUTH_ORIGIN = "https://api.me3.app"

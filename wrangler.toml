name = "me3-core-worker"
main = "apps/worker/src/index.ts"
compatibility_date = "2024-04-01"

[[durable_objects.bindings]]
name = "ME3_USER_AGENT"
class_name = "Me3UserAgent"

[[migrations]]
tag = "2026-05-11-me3-core-user-agent"
new_sqlite_classes = ["Me3UserAgent"]

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "me3-core-db"
database_id = "replace-with-generated-d1-id"
migrations_dir = "apps/worker/migrations"

# Core file storage for site media and future plugin-owned files.
[[r2_buckets]]
binding = "SITE_ASSETS"
bucket_name = "me3-site-assets"

[[queues.producers]]
binding = "ASSISTANT_JOB_EVENTS"
queue = "me3-assistant-job-events"

[[queues.consumers]]
queue = "me3-assistant-job-events"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "me3-assistant-job-events-dlq"

[[queues.consumers]]
queue = "me3-assistant-job-events-dlq"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 0

# Cloudflare Email Service sender binding. Account -> Email stores the sender
# address; this deploy-time binding lets the Worker call env.EMAIL.send().
[[send_email]]
name = "EMAIL"

[vars]
# Optional custom-domain setup. Leave these commented until you attach the
# matching hostnames to this Worker in Cloudflare. Core infers:
# - me3.yourdomain.com for the private app/login
# - api.yourdomain.com for API URLs and me.json action links
# - www.yourdomain.com for the public site
# ME3_CUSTOM_DOMAIN = "yourdomain.com"

# Advanced installs can override inferred hosts/origins when needed:
# ME3_SITE_HOST = "custom-public-host.com"
# ME3_ADMIN_HOST = "admin.custom-public-host.com"
# ME3_API_HOST = "api.custom-public-host.com"
# CORE_WEB_ORIGIN = "https://admin.custom-public-host.com"
# CORE_API_ORIGIN = "https://api.custom-public-host.com"

# TELEGRAM_BOT_USERNAME = "your_me3_bot"
# Optional Telegram agent channel. Store these with `wrangler secret put`,
# not in this file:
# - TELEGRAM_BOT_TOKEN
# - TELEGRAM_WEBHOOK_SECRET

[assets]
directory = "apps/web/dist"
binding = "ASSETS"
# The Worker must see every request so it can route by hostname:
# inferred ME3_SITE_HOST serves the public site; admin/API hosts serve the SPA/API.
run_worker_first = ["/*"]
not_found_handling = "single-page-application"

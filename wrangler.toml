name = "my-me3"
main = "apps/worker/src/index.ts"
compatibility_date = "2026-06-24"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

[[durable_objects.bindings]]
name = "ME3_USER_AGENT"
class_name = "Me3UserAgent"

[[migrations]]
tag = "2026-05-11-me3-core-user-agent"
new_sqlite_classes = ["Me3UserAgent"]

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "me3-core-db"
database_id = "replace-with-generated-d1-id"
migrations_dir = "apps/worker/migrations"

# Keep this visible to Cloudflare's Deploy form so accounts without R2 see the activation warning.
[[r2_buckets]]
binding = "SITE_ASSETS"
bucket_name = "my-me3-site-assets"

[triggers]
crons = ["*/15 * * * *"]

[assets]
directory = "apps/web/dist"
binding = "ASSETS"
# The Worker must see every request so it can route by hostname:
# saved custom domains serve the public site; admin/API hosts serve the SPA/API.
run_worker_first = ["/*"]
not_found_handling = "single-page-application"

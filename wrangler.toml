name = "me3"
main = "apps/worker/src/index.ts"
compatibility_date = "2024-04-01"

[[durable_objects.bindings]]
name = "ME3_USER_AGENT"
class_name = "Me3UserAgent"

[[migrations]]
tag = "2026-05-11-me3-core-user-agent"
new_sqlite_classes = ["Me3UserAgent"]

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "me3-core-db"
database_id = "replace-with-generated-d1-id"
migrations_dir = "apps/worker/migrations"

# Optional large-site media storage. Uncomment after creating the bucket.
# [[r2_buckets]]
# binding = "SITE_ASSETS"
# bucket_name = "me3-site-assets"

[assets]
directory = "apps/web/dist"
binding = "ASSETS"
# The Worker must see every request so it can route by hostname:
# ME3_SITE_HOST serves the public site, ME3_ADMIN_HOST serves the admin SPA/API.
run_worker_first = ["/*"]
not_found_handling = "single-page-application"

[vars]
ENVIRONMENT = "production"
CORE_WEB_ORIGIN = "https://me3.customdomain.com"
CORE_API_ORIGIN = "https://me3.customdomain.com"
ME3_ADMIN_HOST = "me3.customdomain.com"
ME3_SITE_HOST = "www.customdomain.com"
# Optional. Set this if you want the public host to serve a specific claimed site.
# If omitted, Core serves the first profile site, or a site whose custom_domain matches ME3_SITE_HOST.
# ME3_SITE_USERNAME = "owner"
ME3_AI_DEFAULT_PROVIDER = "workers-ai"
ME3_AI_DEFAULT_MODEL = "@cf/meta/llama-3.1-8b-instruct"
ME3_AI_CHAT_PROVIDER = "workers-ai"
ME3_AI_CHAT_MODEL = "@cf/meta/llama-3.1-8b-instruct"
ME3_AI_REASONING_PROVIDER = "workers-ai"
ME3_AI_REASONING_MODEL = "@cf/deepseek-ai/deepseek-r1-distill-qwen-32b"
ME3_AI_EXTRACTION_PROVIDER = "workers-ai"
ME3_AI_EXTRACTION_MODEL = "@cf/meta/llama-3.1-8b-instruct"

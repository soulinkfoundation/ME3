name: Provision managed ME3

on:
  workflow_dispatch:
    inputs:
      installation_id:
        description: Control-plane installation ID
        required: true
        type: string
      worker_name:
        description: Dedicated Worker name
        required: true
        type: string
      d1_name:
        description: Dedicated D1 name
        required: true
        type: string
      r2_name:
        description: Dedicated R2 name
        required: true
        type: string
      release_tag:
        description: Exact stable ME3 release tag
        required: true
        type: string
      callback_url:
        description: Fixed ME3 Cloud provisioning callback
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: managed-install-${{ inputs.installation_id }}
  cancel-in-progress: false

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.ME3_MANAGED_CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.ME3_MANAGED_CLOUDFLARE_ACCOUNT_ID }}
      ME3_MANAGED_CALLBACK_SECRET: ${{ secrets.ME3_MANAGED_CALLBACK_SECRET }}
      ME3_MANAGED_CALLBACK_URL: ${{ inputs.callback_url }}
      ME3_MANAGED_INSTALLATION_ID: ${{ inputs.installation_id }}
      ME3_MANAGED_RELEASE_TAG: ${{ inputs.release_tag }}
      ME3_MANAGED_EMAIL_GATEWAY_ORIGIN: https://api.me3.app
      WORKER_NAME: ${{ inputs.worker_name }}
      D1_NAME: ${{ inputs.d1_name }}
      R2_NAME: ${{ inputs.r2_name }}

    steps:
      - name: Validate the deployment contract
        shell: bash
        run: |
          set -euo pipefail
          set +x
          [[ "$ME3_MANAGED_INSTALLATION_ID" =~ ^mi-[0-9a-f]{16}$ ]]
          test "$WORKER_NAME" = "me3-${ME3_MANAGED_INSTALLATION_ID}"
          test "$D1_NAME" = "${WORKER_NAME}-d1"
          test "$R2_NAME" = "${WORKER_NAME}-r2"
          [[ "$ME3_MANAGED_RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test "$ME3_MANAGED_CALLBACK_URL" = "https://api.me3.app/api/managed-install/provisioning/callback"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$ME3_MANAGED_CALLBACK_SECRET"

      - name: Check out provisioning controls
        uses: actions/checkout@v4
        with:
          ref: main
          path: control

      - name: Check out the exact ME3 release
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}
          path: source

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Install the pinned release
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Configure the private managed deployment
        run: node control/scripts/configure-managed-install.mjs source/wrangler.toml "$WORKER_NAME" false "$ME3_MANAGED_INSTALLATION_ID" "$ME3_MANAGED_EMAIL_GATEWAY_ORIGIN"

      - name: Provision isolated D1 and R2
        working-directory: source
        run: |
          set -euo pipefail
          set +x
          pnpm deploy:prepare -- \
            --config wrangler.toml \
            --db-name "$D1_NAME" \
            --bucket "$R2_NAME" \
            --with-r2

      - name: Freeze the exact managed resource manifest
        run: |
          set -euo pipefail
          set +x
          node control/scripts/managed-resource-manifest.mjs \
            --config source/wrangler.toml \
            --installation-id "$ME3_MANAGED_INSTALLATION_ID" \
            --worker-name "$WORKER_NAME" \
            --d1-name "$D1_NAME" \
            --r2-name "$R2_NAME" \
            --github-env "$GITHUB_ENV"

      - name: Provision isolated managed queues
        working-directory: source
        run: node ../control/scripts/provision-managed-queues.mjs --config wrangler.toml --worker-name "$WORKER_NAME" --queue-names "$ME3_MANAGED_QUEUE_NAMES"

      - name: Report resource provisioning
        env:
          ME3_MANAGED_STATUS: provisioning
          ME3_MANAGED_STAGE: resources
        run: node control/scripts/managed-install-workflow-callback.mjs

      - name: Build the pinned release
        working-directory: source
        run: pnpm build

      - name: Apply D1 migrations before deployment
        working-directory: source
        run: |
          set -euo pipefail
          set +x
          pnpm db:migrations:apply
          pnpm exec wrangler d1 migrations list DB --remote --config wrangler.toml

      - name: Report migration completion
        env:
          ME3_MANAGED_STATUS: provisioning
          ME3_MANAGED_STAGE: migrations
        run: node control/scripts/managed-install-workflow-callback.mjs

      - name: Apply the Durable Object migration privately
        working-directory: source
        run: |
          set -euo pipefail
          set +x
          grep -q '^workers_dev = false$' wrangler.toml
          pnpm exec wrangler deploy \
            --config wrangler.toml \
            --strict \
            --tag "managed-bootstrap-${ME3_MANAGED_INSTALLATION_ID}" \
            --message "Private managed bootstrap ${ME3_MANAGED_INSTALLATION_ID}"

      - name: Resolve the dedicated Durable Object namespace
        run: node control/scripts/resolve-managed-do-namespace.mjs

      - name: Install the recovery secret without exposing it
        working-directory: source
        run: |
          set -euo pipefail
          set +x
          password_file="$RUNNER_TEMP/me3-setup-password"
          openssl rand -hex 32 > "$password_file"
          chmod 600 "$password_file"
          pnpm exec wrangler secret put SETUP_PASSWORD --config wrangler.toml < "$password_file"
          rm -f "$password_file"

      - name: Publish the managed Worker
        run: |
          set -euo pipefail
          set +x
          node control/scripts/configure-managed-install.mjs source/wrangler.toml "$WORKER_NAME" true "$ME3_MANAGED_INSTALLATION_ID" "$ME3_MANAGED_EMAIL_GATEWAY_ORIGIN"
          cd source
          pnpm exec wrangler deploy \
            --config wrangler.toml \
            --strict \
            --tag "$ME3_MANAGED_RELEASE_TAG" \
            --message "Managed ME3 $ME3_MANAGED_RELEASE_TAG $ME3_MANAGED_INSTALLATION_ID" \
            2>&1 | tee "$RUNNER_TEMP/me3-public-deploy.log"
          origin="$(grep -Eo 'https://[^[:space:]]+\.workers\.dev' "$RUNNER_TEMP/me3-public-deploy.log" | tail -1)"
          test -n "$origin"
          printf 'ME3_MANAGED_ORIGIN=%s\n' "$origin" >> "$GITHUB_ENV"

      - name: Report deployment verification
        env:
          ME3_MANAGED_STATUS: provisioning
          ME3_MANAGED_STAGE: verifying
        run: node control/scripts/managed-install-workflow-callback.mjs

      - name: Verify the real managed origin
        run: |
          set -euo pipefail
          curl --retry 15 --retry-delay 2 --retry-max-time 60 --retry-all-errors --connect-timeout 10 -fsS "$ME3_MANAGED_ORIGIN/health" > "$RUNNER_TEMP/health.json"
          curl --retry 15 --retry-delay 2 --retry-max-time 60 --retry-all-errors --connect-timeout 10 -fsS "$ME3_MANAGED_ORIGIN/api/mobile/config" > "$RUNNER_TEMP/mobile-config.json"
          HEALTH_PATH="$RUNNER_TEMP/health.json" MOBILE_PATH="$RUNNER_TEMP/mobile-config.json" node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";
          const health = JSON.parse(readFileSync(process.env.HEALTH_PATH, "utf8"));
          const mobile = JSON.parse(readFileSync(process.env.MOBILE_PATH, "utf8"));
          if (health.ok !== true || health.service !== "me3-core") throw new Error("health failed");
          for (const binding of ["db", "userAgent", "workersAi", "siteAssets"]) {
            if (health.bindings?.[binding] !== true) throw new Error(`${binding} binding missing`);
          }
          if (!/^core_[0-9a-f-]{36}$/.test(mobile.installId || "")) throw new Error("install ID missing");
          if (new URL(mobile.publicURL).origin !== process.env.ME3_MANAGED_ORIGIN) throw new Error("origin mismatch");
          if (mobile.mobileApiVersion !== 1 || mobile.auth?.pairing !== "owner-approved-code") {
            throw new Error("mobile contract mismatch");
          }
          NODE

      - name: Activate through ME3 Cloud
        env:
          ME3_MANAGED_STATUS: ready
        run: node control/scripts/managed-install-workflow-callback.mjs

      - name: Recover every known resource identifier
        if: always()
        continue-on-error: true
        run: node control/scripts/recover-managed-provision-manifest.mjs source/wrangler.toml

      - name: Report a safe failure
        if: failure()
        env:
          ME3_MANAGED_STATUS: failed
          ME3_MANAGED_ERROR_CODE: workflow_failed
        run: node control/scripts/managed-install-workflow-callback.mjs
